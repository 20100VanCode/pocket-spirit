; Pocket Spirit - Lumy Example
; Target: Lilygo T-Display-S3 (ST7789 170x320)

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino

; Library dependencies
lib_deps =
    lvgl/lvgl@^8.3.0
    bodmer/TFT_eSPI@^2.5.0

; PocketSpirit library (local)
lib_extra_dirs = ../../

; TFT_eSPI configuration for Lilygo T-Display-S3
build_flags =
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=12
    -DTFT_BL=38
    ; ST7789 specific - try these if display is blank/inverted
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_INVERSION_ON=1
    ; Lower SPI frequency for stability
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DLV_CONF_PATH=lv_conf.h
    ; Rotation: 0=portrait, 1=landscape, 2=inv portrait, 3=inv landscape
    -DTFT_ROTATION=0
    ; Disable touch - not present on T-Display-S3
    -DTOUCH_CS=-1

monitor_speed = 115200
