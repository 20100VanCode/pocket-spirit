; Pocket Spirit - Lumy Example
; Target: ESP32-S3 + Waveshare 1.28" Round Display (GC9A01)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Library dependencies
lib_deps =
    lvgl/lvgl@^8.3.0
    bodmer/TFT_eSPI@^2.5.0

; PocketSpirit library (local)
lib_extra_dirs = ../../

; TFT_eSPI configuration via build flags
build_flags =
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=12
    -DTFT_BL=2
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLV_CONF_PATH=../../lv_conf.h

monitor_speed = 115200
