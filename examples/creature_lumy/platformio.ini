; Pocket Spirit - Lumy Example
; Target: Lilygo T-Display-S3 (ST7789 170x320)

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino

; Library dependencies
lib_deps =
    lvgl/lvgl@^8.3.0
    bodmer/TFT_eSPI@^2.5.0

; PocketSpirit library (local)
lib_extra_dirs = ../../

; TFT_eSPI configuration for Lilygo T-Display-S3
build_flags =
    ; Critical: prevent TFT_eSPI from loading default User_Setup.h
    -DUSER_SETUP_LOADED=1
    ; Driver
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    ; SPI pins for Lilygo T-Display-S3
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_MISO=-1
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=12
    -DTFT_BL=38
    ; Use SPI2 (FSPI) for ESP32-S3
    -DSPI_BUS=2
    ; ST7789 specific
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_INVERSION_ON=1
    ; SPI frequency
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DLV_CONF_PATH=lv_conf.h
    -DTFT_ROTATION=0
    ; Disable touch
    -DTOUCH_CS=-1

monitor_speed = 115200
